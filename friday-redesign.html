<html>
<head>
    <title>Friday Redesign</title>
    <link rel="stylesheet" type="text/css" href="styles.css">
    <script src="script.js"></script>
</head>
<body>
    <header>
        <h1>Welcome to Friday AI</h1>
        <div class="auth-screen">
            <h2>Log In</h2>
            <form>
                <input type="text" placeholder="Username" required>
                <input type="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
        </div>
    </header>
    <main>
        <div class="arc-reactor">
            <div class="reactor-animation"></div>
        </div>
        <div class="chat-functionality">
            <h2>Chat</h2>
            <div class="chat-window"></div>
            <input type="text" placeholder="Type a message..." />
            <button>Send</button>
        </div>
                <div class="settings-modal">
            <button id="settings-btn">Settings</button>
            <div class="modal-content">
                <h2>Settings</h2>
                <form>
                    <label for="setting1">Setting 1:</label>
                    <input type="checkbox" id="setting1">
                    <label for="setting2">Setting 2:</label>
                    <input type="checkbox" id="setting2">
                </form>
            </div>
        </div>
    </main>
    <footer>
        <p>Secure Backend API Integration</p>
    </footer>
</body>
</html>
