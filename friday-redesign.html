<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friday Redesign</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Orbitron', sans-serif;
            background-color: cyan;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .orb {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(0,204,255,1) 50%, rgba(0,0,0,1) 100%);
            box-shadow: 0 0 20px rgba(0, 204, 255, 0.5);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="orb"></div>
    <h1>Welcome to Friday Redesign</h1>
    <p>Integrating secure authentication and backend API integration.</p>
    <script>
        // JavaScript for JWT authentication and chat functionality
        const login = async () => {
            // Example authentication API call
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username: 'user', password: 'pass' })
            });
            const data = await response.json();
            if (data.token) {
                // Store token securely
                localStorage.setItem('jwt_token', data.token);
            }
        };
    </script>
</body>
</html>
